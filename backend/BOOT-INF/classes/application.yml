spring:
  application:
    name: hotel-pms

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/hotel_pms}
      auto-index-creation: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

app:
  seed:
    # Set ADMIN_EMAIL / ADMIN_INITIAL_PASSWORD env vars to override.
    # If ADMIN_INITIAL_PASSWORD is absent a secure random password is generated
    # and printed once to the log — change it immediately afterwards.
    admin-email: ${ADMIN_EMAIL:admin@hotel.local}
  security:
    jwt:
      secret: ${JWT_SECRET}
      issuer: ${JWT_ISSUER:hotel-pms}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL:15}
      refresh-token-ttl-days: ${JWT_REFRESH_TTL:7}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    hotelpms: DEBUG
